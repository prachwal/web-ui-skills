name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, for example v1.0.5
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.release_tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org/

      - name: Upgrade npm
        run: npm install -g npm@11.5.1

      - name: Validate package version matches release tag
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.release_tag }}"
          VERSION="$(node -p "require('./package.json').version")"
          EXPECTED="v${VERSION}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "Release tag $TAG does not match package version $VERSION"
            exit 1
          fi

      - name: Install
        run: npm ci --ignore-scripts

      - name: Pack check
        run: npm pack --dry-run

      - name: Publish
        run: npm publish --access public
