<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Netlify Site</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to My Netlify Site</h1>
    </header>
    <main>
        <p>This is a simple static example deployed via Netlify CLI.</p>
        <p>Check the environment variables: <span id="env">Loading...</span></p>
    </main>
    <footer>
        <p>Powered by Netlify</p>
    </footer>
    <script>
        // Example of using env var (would need function for dynamic)
        document.getElementById('env').textContent = 'Static page - no dynamic env vars here.';
    </script>
</body>
</html>
